<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пушкарь Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Всплывающее уведомление -->
    <div id="notification"></div>

    <header>
        <div class="shop-info">
            <h1>Пушкарь Shop</h1>
            <p class="shop-tagline">Самооборона</p>
            <p class="shop-about">
                Сигнальные патроны, пусковые устройства, электрошокеры, ножи, перцовые баллончики — для вашей безопасности. Большой выбор перцовых баллончиков (гелевые, аэрозольные, струйные) — уточняйте у продавца.
            </p>
        </div>
    </header>

    <main class="shop-container" id="product-grid">
        <!-- Товары грузятся из script.js -->
    </main>

    <!-- Иконка корзины -->
    <div class="cart-icon" onclick="openCart()">
        🛒 <span id="cart-count">0</span>
    </div>

    <!-- Окно корзины -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h2>Ваш заказ</h2>
            <div id="cart-items-list">Корзина пуста</div>
            <a href="#" id="tg-link" class="tg-button" target="_blank">Написать в Telegram</a>
            <button class="close-btn" onclick="closeCart()">Вернуться к покупкам</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
