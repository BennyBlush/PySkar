<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benny Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="notification"></div>

    <header>
        <h1>BENNY NFT SHOP</h1>
    </header>

    <div class="shop-container" id="product-grid">
        <!-- Товары добавятся автоматически из script.js -->
    </div>

    <!-- Плавающая кнопка корзины -->
    <div class="cart-icon" onclick="openCart()">
        🛒 <span id="cart-count">0</span>
    </div>

    <!-- Модальное окно корзины -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h2>Корзина</h2>
            <div id="cart-items-list"></div>
            <a href="#" id="tg-link" class="tg-button" target="_blank">Перейти в ТГ</a>
            <button class="close-btn" onclick="closeCart()">Закрыть</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
